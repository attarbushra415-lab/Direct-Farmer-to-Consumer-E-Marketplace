<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Marketplace</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #2e7d32;
  color: white;
  text-align: center;
  padding: 15px;
}

nav {
  background: #388e3c;
  display: flex;
  justify-content: center;
}

nav a {
  color: white;
  padding: 10px 20px;
  text-decoration: none;
}

.top-bar {
  text-align: center;
  padding: 15px;
}

.hero {
  text-align: center;
  padding: 40px;
  background: url('https://source.unsplash.com/1200x400/?farm') no-repeat center/cover;
  color: white;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
}

button {
  padding: 8px;
  margin-top: 10px;
  cursor: pointer;
}

.cart-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: orange;
  padding: 10px;
  border-radius: 10px;
  color: white;
}

.cart-modal {
  display: none;
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  padding: 20px;
  width: 300px;
  border-radius: 10px;
  box-shadow: 0 0 10px gray;
}

.dark {
  background: #121212;
  color: white;
}
</style>

</head>

<body>

<header>
<h2>🌾 Farmer Marketplace</h2>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
</nav>

<div class="top-bar">
<input type="text" placeholder="Search..." onkeyup="searchProduct(this.value)">
<button onclick="toggleDark()">🌙</button>
</div>

<div class="cart-btn" onclick="openCart()">
🛒 <span id="count">0</span>
</div>

<div class="cart-modal" id="cartModal">
<h3>Your Cart</h3>
<ul id="cartItems"></ul>
<p>Total: ₹<span id="total">0</span></p>
<button onclick="closeCart()">Close</button>
</div>

<section class="hero">
<h1>Fresh Products</h1>
</section>

<section class="products">

<div class="card">
<img src="https://source.unsplash.com/300x200/?tomato">
<h3>Tomatoes</h3>
<p>₹30</p>
<button onclick="addToCart('Tomatoes',30)">Add</button>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?potato">
<h3>Potatoes</h3>
<p>₹20</p>
<button onclick="addToCart('Potatoes',20)">Add</button>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?carrot">
<h3>Carrots</h3>
<p>₹40</p>
<button onclick="addToCart('Carrots',40)">Add</button>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?onion">
<h3>Onions</h3>
<p>₹25</p>
<button onclick="addToCart('Onions',25)">Add</button>
</div>

</section>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCartUI() {
  document.getElementById("count").innerText = cart.length;

  let list = document.getElementById("cartItems");
  let total = 0;
  list.innerHTML = "";

  cart.forEach((item, index) => {
    total += item.price;
    list.innerHTML += `<li>${item.name} - ₹${item.price} <button onclick="removeItem(${index})">X</button></li>`;
  });

  document.getElementById("total").innerText = total;
}

function addToCart(name, price) {
  cart.push({name, price});
  saveCart();
  updateCartUI();
}

function removeItem(index) {
  cart.splice(index, 1);
  saveCart();
  updateCartUI();
}

function openCart() {
  document.getElementById("cartModal").style.display = "block";
}

function closeCart() {
  document.getElementById("cartModal").style.display = "none";
}

function searchProduct(val) {
  let cards = document.querySelectorAll(".card");
  cards.forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(val.toLowerCase()) ? "block" : "none";
  });
}

function toggleDark() {
  document.body.classList.toggle("dark");
}

updateCartUI();
</script>

</body>
</html>
