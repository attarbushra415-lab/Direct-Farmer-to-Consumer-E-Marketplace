<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Marketplace</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }
header { background:#2e7d32; color:white; text-align:center; padding:15px; }
nav { background:#388e3c; display:flex; justify-content:center; }
nav a { color:white; padding:10px 20px; text-decoration:none; }
.top-bar { text-align:center; padding:15px; }
.hero {
  text-align:center;
  padding:40px;
  background:#4caf50;
  color:white;
}
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}
.card {
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
.card img { width:100%; height:150px; object-fit:cover; }
button { padding:8px; margin-top:10px; cursor:pointer; }
.cart-box {
  position:fixed;
  top:10px;
  right:10px;
  background:orange;
  padding:10px;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<header>
<h2>🌾 Farmer Marketplace</h2>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
</nav>

<div class="top-bar">
<input type="text" placeholder="Search..." onkeyup="searchProduct(this.value)">
</div>

<div class="cart-box">
🛒 Cart: <span id="count">0</span>
</div>

<section class="hero">
<h1>Fresh Products Direct from Farmers</h1>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/300x200?text=Tomato">
<h3>Tomatoes</h3>
<p>₹30</p>
<button onclick="addToCart()">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200?text=Potato">
<h3>Potatoes</h3>
<p>₹20</p>
<button onclick="addToCart()">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200?text=Carrot">
<h3>Carrots</h3>
<p>₹40</p>
<button onclick="addToCart()">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200?text=Onion">
<h3>Onions</h3>
<p>₹25</p>
<button onclick="addToCart()">Add</button>
</div>

</section>

<script>
let count = 0;

function addToCart(){
  count++;
  document.getElementById("count").innerText = count;
}

function searchProduct(val){
  let cards = document.querySelectorAll(".card");
  cards.forEach(card => {
    card.style.display =
      card.innerText.toLowerCase().includes(val.toLowerCase())
      ? "block" : "none";
  });
}
</script>

</body>
</html>
