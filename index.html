
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Cart</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eee;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

/* Mobile screen box */
.screen {
  width: 260px;
  height: 520px;
  border-radius: 12px;
  overflow: hidden;
  background: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  position: relative;
}

/* Splash */
.splash {
  background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
}

.logo {
  background: white;
  color: green;
  padding: 12px;
  border-radius: 50%;
  font-size: 22px;
  margin-bottom: 10px;
}

/* Language */
.language {
  background: url('https://images.unsplash.com/photo-1502082553048-f009c37129b9') center/cover;
  color: white;
  padding: 20px;
}

.language h3 {
  text-align: center;
}

.lang-list p {
  margin: 8px 0;
}

/* Buttons */
.btn {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 5px;
  background: green;
  color: white;
  margin-top: 15px;
}

/* Signup */
.signup {
  padding: 15px;
}

.signup input {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
}

/* Products */
.products {
  padding: 10px;
}

.item {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
}

.item img {
  width: 50px;
  height: 50px;
  margin-right: 10px;
}

.item span {
  flex: 1;
}

/* Cart */
.cart-box {
  background: #f8f8f8;
  padding: 8px;
  border-radius: 5px;
  margin-top: 10px;
  font-size: 13px;
}
</style>

</head>

<body>

<!-- Splash -->
<div class="screen splash">
  <div class="logo">🛒</div>
  <h2>Farmer Cart</h2>
</div>

<!-- Language -->
<div class="screen language">
  <h3>Select Language</h3>
  <div class="lang-list">
    <p>English</p>
    <p>Hindi (हिंदी)</p>
    <p>Marathi (मराठी)</p>
    <p>Telugu (తెలుగు)</p>
  </div>
  <button class="btn">Continue</button>
</div>

<!-- Signup -->
<div class="screen signup">
  <h3>Create Account</h3>
  <input placeholder="Email / Mobile">
  <input placeholder="Username">
  <input type="password" placeholder="Password">
  <button class="btn">Continue</button>
</div>

<!-- Final Product + Cart Screen -->
<div class="screen products">

  <h3>Products</h3>

  <div class="item">
    <img src="https://cdn-icons-png.flaticon.com/512/135/135620.png">
    <span>Tomato ₹40</span>
    <button onclick="addItem('Tomato',40)">Add</button>
  </div>

  <div class="item">
    <img src="https://cdn-icons-png.flaticon.com/512/590/590685.png">
    <span>Mango ₹80</span>
    <button onclick="addItem('Mango',80)">Add</button>
  </div>

  <div class="item">
    <img src="https://cdn-icons-png.flaticon.com/512/766/766020.png">
    <span>Mushroom ₹40</span>
    <button onclick="addItem('Mushroom',40)">Add</button>
  </div>

  <div class="item">
    <img src="https://cdn-icons-png.flaticon.com/512/2909/2909760.png">
    <span>Grapes ₹60</span>
    <button onclick="addItem('Grapes',60)">Add</button>
  </div>

  <!-- Cart -->
  <div id="cartBox" class="cart-box"></div>

  <h4 id="total">Total: ₹0</h4>

  <button class="btn" onclick="checkout()">Checkout</button>

</div>

<script>
let total = 0;
let items = [];

function addItem(name, price) {
  items.push(name + " ₹" + price);
  total += price;

  document.getElementById("cartBox").innerHTML =
    "<b>Items:</b><br>" + items.join("<br>");

  document.getElementById("total").innerText =
    "Total: ₹" + total;
}

function checkout() {
  if(items.length === 0){
    alert("Cart is empty!");
  } else {
    alert("Order placed successfully!");
  }
}
</script>

</body>
</html>
